name: Build and Push Docker Image

on:
  schedule:
    - cron: "0 3 * * *"   # nightly at 3am UTC
  workflow_dispatch:
    inputs:
      force:
        description: "Force rebuild even if already up to date"
        type: boolean
        default: false

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get latest Forge Classic release
        id: forge_release
        run: |
          LATEST=$(curl -fsSL \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/Haoming02/sd-webui-forge-classic/releases/latest \
            | jq -r '.tag_name')
          echo "tag=${LATEST}" >> "$GITHUB_OUTPUT"
          echo "Latest Forge Classic release: ${LATEST}"

      - name: Get last built release
        id: last_built
        run: |
          LAST=$(cat .last-built-release 2>/dev/null || echo "none")
          echo "tag=${LAST}" >> "$GITHUB_OUTPUT"
          echo "Last built: ${LAST}"

      - name: Determine whether to build
        id: should_build
        run: |
          if [ "${{ steps.forge_release.outputs.tag }}" != "${{ steps.last_built.outputs.tag }}" ] || [ "${{ inputs.force }}" == "true" ]; then
            echo "result=true" >> "$GITHUB_OUTPUT"
            echo "Building ${{ steps.forge_release.outputs.tag }} (force=${{ inputs.force }})"
          else
            echo "result=false" >> "$GITHUB_OUTPUT"
            echo "Already on ${{ steps.forge_release.outputs.tag }}, nothing to do."
          fi

      - name: Log in to GitHub Container Registry
        if: steps.should_build.outputs.result == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: steps.should_build.outputs.result == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        if: steps.should_build.outputs.result == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            FORGE_VERSION=${{ steps.forge_release.outputs.tag }}
          tags: |
            ghcr.io/jonhearsch/sd-webui-forge:${{ steps.forge_release.outputs.tag }}
            ghcr.io/jonhearsch/sd-webui-forge:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Record built release
        if: steps.should_build.outputs.result == 'true'
        run: |
          echo "${{ steps.forge_release.outputs.tag }}" > .last-built-release
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .last-built-release
          git commit -m "chore: built ${{ steps.forge_release.outputs.tag }}"
          git pull --rebase
          git push
