services:
  forge:
    image: ghcr.io/jonhearsch/sd-webui-forge:latest
    container_name: sd-webui-forge
    restart: unless-stopped
    ports:
      - "7860:7860"
    volumes:
      - /mnt/user/appdata/sd-webui-forge/models:/home/forge/sd-webui/models
      - /mnt/user/appdata/sd-webui-forge/output:/home/forge/sd-webui/output
      - /mnt/user/appdata/sd-webui-forge/extensions:/home/forge/sd-webui/extensions
      - /mnt/user/appdata/sd-webui-forge/config:/home/forge/sd-webui/config
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      # Optional: pass extra launch args e.g. "--medvram --xformers"
      # - COMMANDLINE_ARGS=
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower-forge
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_POLL_INTERVAL=3600
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_SCOPE=forge
    command: --scope forge
    labels:
      - "com.centurylinklabs.watchtower.scope=forge"
